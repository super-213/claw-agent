<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claw Agent Web UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #080b10;
      --bg-1: #0d1117;
      --bg-2: #121820;
      --bg-3: #1a2130;
      --surface: rgba(20, 28, 42, 0.85);
      --ink: #e8edf5;
      --ink-dim: #7a8fa8;
      --ink-ghost: #3a4d63;
      --neon: #00e5c8;
      --neon-dim: rgba(0, 229, 200, 0.12);
      --neon-glow: 0 0 20px rgba(0, 229, 200, 0.4);
      --amber: #f5a623;
      --amber-dim: rgba(245, 166, 35, 0.12);
      --red: #ff4d6a;
      --stroke: rgba(0, 229, 200, 0.1);
      --stroke-soft: rgba(255,255,255,0.05);
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      background: var(--bg-0);
      overflow: hidden;
    }

    /* Subtle scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 229, 200, 0.015) 2px,
        rgba(0, 229, 200, 0.015) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 200, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 200, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      height: 100vh;
      height: 100svh;
      position: relative;
      z-index: 1;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: rgba(8, 11, 16, 0.95);
      border-right: 1px solid var(--stroke);
      overflow: hidden;
      position: relative;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--neon) 40%, var(--neon) 60%, transparent);
      opacity: 0.3;
    }

    .brand-area {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--stroke-soft);
      position: relative;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--neon), #0099aa);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: var(--neon-glow);
      font-size: 18px;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .brand-name span {
      color: var(--neon);
    }

    .brand-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-ghost);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .sidebar-close {
      display: none;
      position: absolute;
      top: 18px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink-dim);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
    }

    .sidebar-close:hover {
      color: var(--neon);
      border-color: var(--stroke);
      background: rgba(0, 229, 200, 0.08);
    }

    .sidebar-close svg {
      width: 18px;
      height: 18px;
    }

    .sidebar-actions {
      padding: 16px 16px 0;
    }

    .new-btn {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: var(--neon-dim);
      color: var(--neon);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .new-btn:hover {
      background: rgba(0, 229, 200, 0.2);
      box-shadow: var(--neon-glow);
      border-color: var(--neon);
    }

    .new-btn::before {
      content: '+';
      font-size: 16px;
      font-weight: 300;
    }

    .section-label {
      padding: 18px 20px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--ink-ghost);
      text-transform: uppercase;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink-ghost) transparent;
    }

    .session-item {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s;
      margin-bottom: 3px;
      position: relative;
      overflow: visible;
    }

    .session-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--neon);
      opacity: 0;
      transition: opacity 0.18s;
      border-radius: 0 2px 2px 0;
    }

    .session-item:hover {
      background: rgba(0, 229, 200, 0.05);
      border-color: var(--stroke);
    }

    .session-item.active {
      background: var(--neon-dim);
      border-color: var(--stroke);
    }

    .session-item.active::before {
      opacity: 1;
    }

    .session-content {
      min-width: 0;
      padding-right: 30px;
    }

    .session-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item.active .session-title {
      color: var(--neon);
    }

    .session-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-ghost);
      margin-top: 3px;
    }

    .session-more {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      font-size: 18px;
      line-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.16s;
    }

    .session-item:hover .session-more,
    .session-item.menu-open .session-more {
      opacity: 1;
    }

    .session-more:hover,
    .session-item.menu-open .session-more {
      color: var(--neon);
      background: rgba(0, 229, 200, 0.08);
      border-color: var(--stroke);
    }

    .session-menu {
      position: absolute;
      top: 34px;
      right: 8px;
      min-width: 118px;
      padding: 5px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      background: rgba(13, 17, 23, 0.98);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      z-index: 10;
    }

    .session-menu button {
      width: 100%;
      padding: 8px 9px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      text-align: left;
    }

    .session-menu button:hover {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.06);
    }

    .session-menu button.danger {
      color: var(--red);
    }

    .session-menu button.danger:hover {
      background: rgba(255, 77, 106, 0.1);
    }

    .skill-panel {
      padding: 0 10px 14px;
      border-top: 1px solid var(--stroke-soft);
    }

    .skill-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 8px;
      padding: 0 6px 10px;
    }

    .skill-add-btn,
    .skill-reload-btn {
      height: 34px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      background: rgba(0, 229, 200, 0.08);
      color: var(--neon);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }

    .skill-add-btn:hover,
    .skill-reload-btn:hover {
      background: rgba(0, 229, 200, 0.16);
      border-color: var(--neon);
    }

    .skill-reload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      line-height: 1;
    }

    .skill-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 132px;
      overflow-y: auto;
      padding: 0 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink-ghost) transparent;
    }

    .skill-item {
      width: 100%;
      min-height: 32px;
      padding: 7px 9px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.18s, background 0.18s, border-color 0.18s;
    }

    .skill-item:hover {
      color: var(--neon);
      background: rgba(0, 229, 200, 0.05);
      border-color: var(--stroke);
    }

    .skill-empty {
      padding: 8px 9px;
      color: var(--ink-ghost);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .skill-modal {
      width: min(620px, 100%);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: rgba(13, 17, 23, 0.98);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--stroke-soft);
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .modal-close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink-dim);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--neon);
      border-color: var(--stroke);
      background: rgba(0, 229, 200, 0.08);
    }

    .skill-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px 20px 20px;
    }

    .field-label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-ghost);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .skill-input,
    .skill-textarea {
      width: 100%;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-sm);
      background: rgba(20, 30, 46, 0.9);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .skill-input {
      height: 42px;
      padding: 0 12px;
    }

    .skill-textarea {
      min-height: 220px;
      padding: 12px;
      line-height: 1.55;
      resize: vertical;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .skill-input:focus,
    .skill-textarea:focus {
      border-color: rgba(0, 229, 200, 0.42);
      box-shadow: 0 0 0 3px rgba(0, 229, 200, 0.06);
    }

    .skill-form-error {
      min-height: 18px;
      color: var(--red);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-secondary,
    .modal-primary {
      min-width: 86px;
      height: 38px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .modal-secondary {
      border: 1px solid var(--stroke-soft);
      background: transparent;
      color: var(--ink-dim);
    }

    .modal-primary {
      border: 1px solid var(--neon);
      background: var(--neon);
      color: var(--bg-0);
    }

    .modal-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--stroke-soft);
    }

    .config-btn {
      width: 100%;
      height: 34px;
      margin-bottom: 12px;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink-dim);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
    }

    .config-btn:hover {
      color: var(--neon);
      border-color: var(--stroke);
      background: rgba(0, 229, 200, 0.08);
    }

    .config-summary {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      gap: 7px 10px;
      padding: 12px;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-sm);
      background: rgba(20, 30, 46, 0.54);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-dim);
    }

    .config-summary span:nth-child(even) {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
    }

    .sidebar-backdrop {
      display: none;
    }

    .sys-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-dim);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 6px var(--neon);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ─── MAIN ─── */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
      background: var(--bg-1);
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(13, 17, 23, 0.8);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mobile-menu-btn {
      display: none;
      width: 40px;
      height: 40px;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink-dim);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
    }

    .mobile-menu-btn:hover,
    .mobile-menu-btn[aria-expanded="true"] {
      color: var(--neon);
      border-color: var(--stroke);
      background: rgba(0, 229, 200, 0.08);
    }

    .mobile-menu-btn svg {
      width: 20px;
      height: 20px;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .meta-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-dim);
      padding: 5px 10px;
      border: 1px solid var(--stroke-soft);
      border-radius: 999px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--neon);
      padding: 5px 12px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: var(--neon-dim);
      transition: all 0.3s;
    }

    .status-badge.busy {
      color: var(--amber);
      border-color: rgba(245, 166, 35, 0.25);
      background: var(--amber-dim);
    }

    .status-badge .dot {
      width: 5px;
      height: 5px;
    }

    .status-badge.busy .dot {
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber);
    }

    /* Chat window */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink-ghost) transparent;
    }

    .messages-wrap {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
      opacity: 0.4;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .empty-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-ghost);
      letter-spacing: 0.1em;
    }

    /* Message bubbles */
    .message-row {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.25s ease forwards;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user-row {
      align-items: flex-end;
    }

    .message-row.assistant-row,
    .message-row.final-row,
    .message-row.tool-row {
      align-items: flex-start;
    }

    .message-row.protocol-row {
      align-items: center;
    }

    .msg-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .user-row .msg-label { color: var(--amber); }
    .assistant-row .msg-label { color: var(--neon); }
    .final-row .msg-label { color: var(--neon); }
    .tool-row .msg-label { color: var(--ink-dim); }
    .protocol-row .msg-label {
      color: var(--ink-dim);
      width: min(75%, 660px);
    }

    .message {
      max-width: 75%;
      padding: 14px 18px;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }

    .message.user {
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.18), rgba(245, 166, 35, 0.08));
      border: 1px solid rgba(245, 166, 35, 0.25);
      border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
      color: #f0d9a8;
    }

    .message.assistant {
      background: rgba(20, 30, 46, 0.9);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      color: var(--ink);
    }

    .message.final {
      background: linear-gradient(135deg, rgba(0, 229, 200, 0.16), rgba(20, 30, 46, 0.92));
      border: 1px solid rgba(0, 229, 200, 0.34);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      color: var(--ink);
      box-shadow: 0 0 0 1px rgba(0, 229, 200, 0.04), 0 12px 40px rgba(0, 0, 0, 0.22);
    }

    .message.tool {
      background: rgba(0, 229, 200, 0.04);
      border: 1px dashed rgba(0, 229, 200, 0.2);
      border-radius: var(--radius-sm) var(--radius-md) var(--radius-md) var(--radius-md);
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .message.protocol {
      width: min(75%, 660px);
      max-width: min(75%, 660px);
      background: rgba(20, 30, 46, 0.46);
      border: 1px dashed rgba(122, 143, 168, 0.36);
      border-radius: var(--radius-md);
      color: var(--ink-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 12px 14px;
    }

    .msg-usage {
      max-width: 75%;
      padding: 5px 4px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      line-height: 1.5;
      color: var(--ink-ghost);
      word-break: break-word;
    }

    .user-row .msg-usage {
      text-align: right;
    }

    .protocol-flow {
      width: min(75%, 660px);
      display: grid;
      grid-template-columns: auto minmax(120px, 1fr) auto;
      align-items: center;
      gap: 10px;
      margin: 0 0 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-ghost);
    }

    .protocol-endpoint {
      padding: 4px 7px;
      border: 1px solid rgba(122, 143, 168, 0.22);
      border-radius: 999px;
      background: rgba(8, 11, 16, 0.72);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .protocol-wire {
      height: 22px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    .protocol-wire::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px dashed rgba(122, 143, 168, 0.42);
      transform: translateY(-50%);
    }

    .protocol-wire::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-top: 1px solid rgba(122, 143, 168, 0.56);
      border-right: 1px solid rgba(122, 143, 168, 0.56);
      transform: translateY(-50%) rotate(45deg);
    }

    .protocol-flow.reverse .protocol-wire::after {
      right: auto;
      left: -1px;
      transform: translateY(-50%) rotate(-135deg);
    }

    .protocol-packet {
      position: relative;
      z-index: 1;
      padding: 3px 9px;
      border: 1px dashed rgba(0, 229, 200, 0.34);
      border-radius: 6px;
      background: rgba(8, 11, 16, 0.92);
      color: var(--neon);
      letter-spacing: 0.08em;
      white-space: nowrap;
      box-shadow: 0 0 16px rgba(0, 229, 200, 0.12);
    }

    /* Composer */
    .composer-area {
      padding: 16px 28px 22px;
      background: rgba(8, 11, 16, 0.9);
      border-top: 1px solid var(--stroke-soft);
      flex-shrink: 0;
    }

    .composer {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
      background: var(--bg-3);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      padding: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .composer:focus-within {
      border-color: rgba(0, 229, 200, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 229, 200, 0.06), var(--neon-glow);
    }

    textarea {
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--ink);
      min-height: 44px;
      max-height: 160px;
      line-height: 1.6;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    textarea::placeholder {
      color: var(--ink-ghost);
      font-size: 14px;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--neon);
      color: var(--bg-0);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 18px;
    }

    .send-btn:hover {
      background: #00f5d8;
      box-shadow: var(--neon-glow);
      transform: scale(1.04);
    }

    .send-btn:active {
      transform: scale(0.97);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    .composer-hint {
      max-width: 820px;
      margin: 8px auto 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-ghost);
      letter-spacing: 0.05em;
    }

    /* Thinking animation */
    .thinking {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(20, 30, 46, 0.9);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      width: fit-content;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-ghost); border-radius: 4px; }

    /* Mobile */
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        display: flex;
        width: min(84vw, 320px);
        height: 100vh;
        height: 100svh;
        z-index: 30;
        transform: translateX(-100%);
        transition: transform 0.24s ease;
        box-shadow: 18px 0 48px rgba(0, 0, 0, 0.36);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-close {
        display: flex;
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        display: block;
        background: rgba(0, 0, 0, 0.48);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.24s ease;
        z-index: 20;
      }

      .sidebar-backdrop.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .brand-area {
        padding: 22px 60px 16px 20px;
      }

      .brand-icon {
        width: 32px;
        height: 32px;
        margin-bottom: 10px;
      }

      .sidebar-actions {
        padding: 14px 14px 0;
      }

      .section-label {
        padding: 16px 18px 8px;
      }

      .session-list {
        min-height: 0;
        padding: 0 10px 14px;
        -webkit-overflow-scrolling: touch;
      }

      .skill-list {
        max-height: 112px;
      }

      .skill-modal {
        max-height: calc(100svh - 36px);
      }

      .skill-textarea {
        min-height: 180px;
        max-height: 46svh;
      }

      .session-more {
        opacity: 1;
      }

      .topbar {
        padding: 12px 14px;
        gap: 12px;
      }

      .mobile-menu-btn {
        display: flex;
      }

      .topbar-left {
        flex: 1;
      }

      .topbar-meta {
        gap: 8px;
        flex-shrink: 0;
      }

      .meta-badge {
        display: none;
      }

      .chat-window { padding: 20px 18px; }
      .composer-area { padding: 12px 16px 18px; }
      .message { max-width: 92%; }
      .msg-usage { max-width: 92%; }
      .message.protocol,
      .protocol-flow,
      .protocol-row .msg-label {
        width: 92%;
        max-width: 92%;
      }

      .protocol-flow {
        grid-template-columns: auto minmax(56px, 1fr) auto;
        gap: 6px;
        font-size: 9px;
      }

      .protocol-endpoint {
        max-width: 72px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" aria-label="历史对话">
    <div class="brand-area">
      <button class="sidebar-close" id="mobileSidebarClose" type="button" aria-label="关闭历史对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="brand-icon">⚡</div>
      <div class="brand-name"><span>Claw</span> Agent</div>
      <div class="brand-tag">// Web Console v1.0</div>
    </div>
    <div class="sidebar-actions">
      <button class="new-btn" id="newSessionBtn">新建对话</button>
    </div>
    <div class="section-label">// Sessions</div>
    <div class="session-list" id="sessionList"></div>
    <div class="skill-panel">
      <div class="section-label">// Skills</div>
      <div class="skill-toolbar">
        <button class="skill-add-btn" id="addSkillBtn" type="button">添加技能</button>
        <button class="skill-reload-btn" id="reloadSkillsBtn" type="button" title="重载技能" aria-label="重载技能">↻</button>
      </div>
      <div class="skill-list" id="skillList"></div>
    </div>
    <div class="sidebar-footer">
      <button class="config-btn" id="configBtn" type="button">模型设置</button>
      <div class="sys-status">
        <div class="dot"></div>
        <span>System Online</span>
      </div>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="打开历史对话" aria-controls="sidebar" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="18" x2="20" y2="18"></line>
          </svg>
        </button>
        <div class="topbar-title" id="topbarTitle">新对话</div>
      </div>
      <div class="topbar-meta">
        <div class="meta-badge">
          <span id="tokenSummary">Tokens 0</span>
        </div>
        <div class="status-badge" id="statusBadge">
          <div class="dot"></div>
          <span id="statusText">就绪</span>
        </div>
      </div>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="messages-wrap" id="messageList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◈</div>
          <div class="empty-text">// 开始输入以启动对话</div>
        </div>
      </div>
    </div>

    <div class="composer-area">
      <div class="composer">
        <textarea id="messageInput" placeholder="输入指令或问题…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="发送 (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="composer-hint">↵ Enter 发送 · Shift+Enter 换行</div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="configModal" aria-hidden="true">
  <div class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="configModalTitle">
    <div class="modal-head">
      <div class="modal-title" id="configModalTitle">模型设置</div>
      <button class="modal-close" id="configModalClose" type="button" aria-label="关闭">×</button>
    </div>
    <form class="skill-form" id="configForm">
      <div class="config-summary" id="configSummary">
        <span>API URL</span><span>-</span>
        <span>API KEY</span><span>-</span>
        <span>模型</span><span>-</span>
      </div>
      <label class="field-label">
        API URL
        <input class="skill-input" id="configBaseUrlInput" name="base_url" autocomplete="off" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1" />
      </label>
      <label class="field-label">
        API KEY
        <input class="skill-input" id="configApiKeyInput" name="api_key" type="password" autocomplete="new-password" placeholder="留空则保留当前密钥" />
      </label>
      <label class="field-label">
        模型名称
        <input class="skill-input" id="configModelInput" name="model" autocomplete="off" placeholder="qwen-plus" />
      </label>
      <div class="skill-form-error" id="configFormError"></div>
      <div class="modal-actions">
        <button class="modal-secondary" id="configCancelBtn" type="button">取消</button>
        <button class="modal-primary" id="configSaveBtn" type="submit">保存</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-backdrop" id="skillModal" aria-hidden="true">
  <div class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="skillModalTitle">
    <div class="modal-head">
      <div class="modal-title" id="skillModalTitle">添加技能</div>
      <button class="modal-close" id="skillModalClose" type="button" aria-label="关闭">×</button>
    </div>
    <form class="skill-form" id="skillForm">
      <label class="field-label">
        技能名
        <input class="skill-input" id="skillNameInput" name="name" autocomplete="off" placeholder="calculator_ext" />
      </label>
      <label class="field-label">
        Markdown 内容
        <textarea class="skill-textarea" id="skillContentInput" name="content" spellcheck="false" placeholder="# 技能说明&#10;描述这个技能的使用规则、输出格式和注意事项。"></textarea>
      </label>
      <div class="skill-form-error" id="skillFormError"></div>
      <div class="modal-actions">
        <button class="modal-secondary" id="skillCancelBtn" type="button">取消</button>
        <button class="modal-primary" id="skillSaveBtn" type="submit">保存</button>
      </div>
    </form>
  </div>
</div>

<script>
  const sessionListEl = document.getElementById('sessionList');
  const messageListEl = document.getElementById('messageList');
  const chatWindow = document.getElementById('chatWindow');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const newSessionBtn = document.getElementById('newSessionBtn');
  const statusText = document.getElementById('statusText');
  const statusBadge = document.getElementById('statusBadge');
  const tokenSummary = document.getElementById('tokenSummary');
  const topbarTitle = document.getElementById('topbarTitle');
  const emptyState = document.getElementById('emptyState');
  const sidebar = document.getElementById('sidebar');
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const mobileSidebarClose = document.getElementById('mobileSidebarClose');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  const skillListEl = document.getElementById('skillList');
  const addSkillBtn = document.getElementById('addSkillBtn');
  const reloadSkillsBtn = document.getElementById('reloadSkillsBtn');
  const configBtn = document.getElementById('configBtn');
  const configModal = document.getElementById('configModal');
  const configModalClose = document.getElementById('configModalClose');
  const configCancelBtn = document.getElementById('configCancelBtn');
  const configForm = document.getElementById('configForm');
  const configBaseUrlInput = document.getElementById('configBaseUrlInput');
  const configApiKeyInput = document.getElementById('configApiKeyInput');
  const configModelInput = document.getElementById('configModelInput');
  const configSummary = document.getElementById('configSummary');
  const configFormError = document.getElementById('configFormError');
  const configSaveBtn = document.getElementById('configSaveBtn');
  const skillModal = document.getElementById('skillModal');
  const skillModalClose = document.getElementById('skillModalClose');
  const skillCancelBtn = document.getElementById('skillCancelBtn');
  const skillForm = document.getElementById('skillForm');
  const skillNameInput = document.getElementById('skillNameInput');
  const skillContentInput = document.getElementById('skillContentInput');
  const skillFormError = document.getElementById('skillFormError');
  const skillSaveBtn = document.getElementById('skillSaveBtn');

  const state = {
    sessions: [],
    skills: [],
    config: null,
    currentSessionId: null,
    busy: false,
    messages: [],
    openMenuSessionId: null,
  };

  const isMobileLayout = () => window.matchMedia('(max-width: 860px)').matches;

  const setMobileSidebar = (open) => {
    sidebar.classList.toggle('open', open);
    sidebarBackdrop.classList.toggle('visible', open);
    mobileMenuBtn.setAttribute('aria-expanded', String(open));
  };

  const openSkillModal = () => {
    skillForm.reset();
    skillFormError.textContent = '';
    skillModal.classList.add('open');
    skillModal.setAttribute('aria-hidden', 'false');
    setTimeout(() => skillNameInput.focus(), 0);
  };

  const closeSkillModal = () => {
    skillModal.classList.remove('open');
    skillModal.setAttribute('aria-hidden', 'true');
    skillFormError.textContent = '';
  };

  const renderConfigSummary = () => {
    const cfg = state.config || {};
    configSummary.innerHTML = `
      <span>API URL</span><span title="${escapeHtml(cfg.base_url || '')}">${escapeHtml(cfg.base_url || '-')}</span>
      <span>API KEY</span><span>${escapeHtml(cfg.api_key_masked || '<未设置>')}</span>
      <span>模型</span><span>${escapeHtml(cfg.model || '-')}</span>
    `;
  };

  const openConfigModal = async () => {
    configFormError.textContent = '';
    await loadConfig();
    const cfg = state.config || {};
    configBaseUrlInput.value = cfg.base_url || '';
    configApiKeyInput.value = '';
    configModelInput.value = cfg.model || '';
    renderConfigSummary();
    configModal.classList.add('open');
    configModal.setAttribute('aria-hidden', 'false');
    setTimeout(() => configBaseUrlInput.focus(), 0);
  };

  const closeConfigModal = () => {
    configModal.classList.remove('open');
    configModal.setAttribute('aria-hidden', 'true');
    configFormError.textContent = '';
    configApiKeyInput.value = '';
  };

  const formatTime = (value) => {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  };

  const formatTokens = (value) => {
    const tokens = Number(value || 0);
    if (tokens >= 1000000) return (tokens / 1000000).toFixed(1) + 'M';
    if (tokens >= 1000) return (tokens / 1000).toFixed(1) + 'K';
    return String(tokens);
  };

  const formatUsage = (usage) => {
    if (!usage) return '';
    const parts = [
      `tokens ${formatTokens(usage.total_tokens)}`,
      `cum ${formatTokens(usage.cumulative_tokens)}`,
    ];
    if (usage.tool_tokens) parts.push(`tool ${formatTokens(usage.tool_tokens)}`);
    if (usage.category) parts.push(usage.category);
    return parts.join(' · ');
  };

  const escapeHtml = (text) => text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');

  const hasMarker = (text, marker) => {
    const escaped = marker.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp(`^\\s*[\\[［]\\s*${escaped}\\s*[\\]］]`).test(text || '');
  };

  const isFormatNudge = (text) => {
    if (!text) return false;
    return text.includes('请严格按照格式回复')
      && /[\[［]\s*命令\s*[\]］]/.test(text)
      && /[\[［]\s*完成\s*[\]］]/.test(text);
  };

  const getMessageView = (msg) => {
    const content = msg.content || '';
    const rawRole = msg.role || 'assistant';

    if (hasMarker(content, '完成')) {
      return {
        role: 'final',
        label: '// Final Output',
        flow: null,
      };
    }

    if (hasMarker(content, '命令')) {
      return {
        role: 'protocol',
        label: '// Protocol Handshake',
        flow: { from: 'Agent', packet: 'COMMAND', to: 'Shell', reverse: false },
      };
    }

    if (hasMarker(content, '执行完成')) {
      return {
        role: 'protocol',
        label: '// Protocol Handshake',
        flow: { from: 'Shell', packet: 'DATA', to: 'Agent', reverse: true },
      };
    }

    if (isFormatNudge(content)) {
      return {
        role: 'protocol',
        label: '// Protocol Handshake',
        flow: { from: 'Runtime', packet: 'FORMAT ACK', to: 'Agent', reverse: true },
      };
    }

    if (rawRole === 'user') {
      return {
        role: 'user',
        label: '// User Input',
        flow: null,
      };
    }

    return {
      role: rawRole,
      label: rawRole === 'assistant' ? '// Agent' : '// ' + rawRole,
      flow: null,
    };
  };

  const createProtocolFlow = (flow) => {
    const el = document.createElement('div');
    el.className = 'protocol-flow' + (flow.reverse ? ' reverse' : '');
    el.innerHTML = `
      <span class="protocol-endpoint">${escapeHtml(flow.from)}</span>
      <span class="protocol-wire"><span class="protocol-packet">${escapeHtml(flow.packet)}</span></span>
      <span class="protocol-endpoint">${escapeHtml(flow.to)}</span>
    `;
    return el;
  };

  const setStatus = (text, busy = false) => {
    statusText.textContent = text;
    statusBadge.classList.toggle('busy', busy);
    sendBtn.disabled = busy;
  };

  // Auto-resize textarea
  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
  });

  const renderSessions = () => {
    sessionListEl.innerHTML = '';
    state.sessions.forEach((session) => {
      const item = document.createElement('div');
      item.className = 'session-item'
        + (session.id === state.currentSessionId ? ' active' : '')
        + (session.id === state.openMenuSessionId ? ' menu-open' : '');
      item.innerHTML = `
        <div class="session-content">
          <div class="session-title">${escapeHtml(session.title || '新对话')}</div>
          <div class="session-time">${escapeHtml(formatTime(session.updated_at || session.created_at))} · ${escapeHtml(formatTokens(session.token_usage?.total_tokens))} tok</div>
        </div>
        <button class="session-more" type="button" title="更多操作" aria-label="更多操作">⋯</button>
        ${session.id === state.openMenuSessionId ? `
          <div class="session-menu">
            <button type="button" data-action="copy">复制会话</button>
            <button type="button" data-action="delete" class="danger">删除</button>
          </div>
        ` : ''}
      `;
      item.addEventListener('click', (event) => {
        if (event.target.closest('.session-more') || event.target.closest('.session-menu')) return;
        state.openMenuSessionId = null;
        if (isMobileLayout()) setMobileSidebar(false);
        openSession(session.id);
      });
      item.querySelector('.session-more').addEventListener('click', (event) => {
        event.stopPropagation();
        state.openMenuSessionId = state.openMenuSessionId === session.id ? null : session.id;
        renderSessions();
      });
      item.querySelectorAll('.session-menu button').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const action = button.dataset.action;
          if (action === 'copy') copySession(session.id);
          if (action === 'delete') deleteSession(session.id);
        });
      });
      sessionListEl.appendChild(item);
    });
  };

  const renderSkills = () => {
    skillListEl.innerHTML = '';
    if (!state.skills.length) {
      const empty = document.createElement('div');
      empty.className = 'skill-empty';
      empty.textContent = '暂无技能';
      skillListEl.appendChild(empty);
      return;
    }

    state.skills.forEach((skill) => {
      const button = document.createElement('button');
      button.className = 'skill-item';
      button.type = 'button';
      button.title = `插入调用 ${skill.name} skill`;
      button.textContent = skill.name;
      button.addEventListener('click', () => {
        const prefix = `调用 ${skill.name} skill `;
        const current = messageInput.value.trimStart();
        messageInput.value = current ? prefix + current : prefix;
        messageInput.focus();
        messageInput.dispatchEvent(new Event('input'));
        if (isMobileLayout()) setMobileSidebar(false);
      });
      skillListEl.appendChild(button);
    });
  };

  const renderMessages = (messages) => {
    state.messages = messages;
    const visibleMessages = messages.filter(m => m.role !== 'system');
    emptyState.style.display = visibleMessages.length === 0 ? 'flex' : 'none';

    messageListEl.innerHTML = '';
    if (visibleMessages.length === 0) {
      messageListEl.appendChild(emptyState);
      return;
    }

    // Re-add empty state (hidden)
    emptyState.style.display = 'none';
    messageListEl.appendChild(emptyState);

    messages.forEach((msg) => {
      if (msg.role === 'system') return;
      const view = getMessageView(msg);

      const row = document.createElement('div');
      row.className = `message-row ${view.role}-row`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = view.label;

      const bubble = document.createElement('div');
      bubble.className = `message ${view.role}`;
      bubble.innerHTML = escapeHtml(msg.content || '');

      const usage = document.createElement('div');
      usage.className = 'msg-usage';
      usage.textContent = formatUsage(msg.usage);

      row.appendChild(label);
      if (view.flow) row.appendChild(createProtocolFlow(view.flow));
      row.appendChild(bubble);
      if (usage.textContent) row.appendChild(usage);
      messageListEl.appendChild(row);
    });

    chatWindow.scrollTop = chatWindow.scrollHeight;
  };

  const showThinking = () => {
    const row = document.createElement('div');
    row.className = 'message-row assistant-row';
    row.id = 'thinking-row';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = '// Agent';
    const dots = document.createElement('div');
    dots.className = 'thinking';
    dots.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(label);
    row.appendChild(dots);
    messageListEl.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  };

  const hideThinking = () => {
    const el = document.getElementById('thinking-row');
    if (el) el.remove();
  };

  const loadSessions = async () => {
    try {
      const res = await fetch('/api/sessions');
      const data = await res.json();
      state.sessions = data;
      renderSessions();
      if (!state.currentSessionId && state.sessions.length > 0) {
        await openSession(state.sessions[0].id);
      }
    } catch (e) { console.warn('loadSessions:', e); }
  };

  const loadSkills = async () => {
    try {
      const res = await fetch('/api/skills');
      if (!res.ok) return;
      const data = await res.json();
      state.skills = data.skills || [];
      renderSkills();
    } catch (e) { console.warn('loadSkills:', e); }
  };

  const reloadSkills = async () => {
    try {
      const res = await fetch('/api/skills/reload', { method: 'POST' });
      if (!res.ok) return;
      const data = await res.json();
      state.skills = data.skills || [];
      renderSkills();
      setStatus(`技能 ${state.skills.length}`, false);
      setTimeout(() => setStatus('就绪', false), 1200);
    } catch (e) { console.warn('reloadSkills:', e); }
  };

  const loadConfig = async () => {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) return;
      state.config = await res.json();
    } catch (e) { console.warn('loadConfig:', e); }
  };

  const submitConfig = async (event) => {
    event.preventDefault();
    configFormError.textContent = '';
    configSaveBtn.disabled = true;

    try {
      const payload = {
        base_url: configBaseUrlInput.value.trim(),
        model: configModelInput.value.trim(),
      };
      const apiKey = configApiKeyInput.value.trim();
      if (apiKey) payload.api_key = apiKey;

      const res = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        configFormError.textContent = data.message || '保存失败';
        return;
      }

      state.config = data.config;
      renderConfigSummary();
      closeConfigModal();
      setStatus('配置已保存', false);
      setTimeout(() => setStatus('就绪', false), 1200);
    } catch (e) {
      configFormError.textContent = '网络错误';
      console.warn('submitConfig:', e);
    } finally {
      configSaveBtn.disabled = false;
    }
  };

  const submitSkill = async (event) => {
    event.preventDefault();
    const name = skillNameInput.value.trim();
    const content = skillContentInput.value.trim();
    skillFormError.textContent = '';

    skillSaveBtn.disabled = true;
    try {
      const res = await fetch('/api/skills', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content }),
      });
      const data = await res.json();
      if (!res.ok) {
        skillFormError.textContent = data.message || '添加失败';
        return;
      }

      closeSkillModal();
      await loadSkills();
      setStatus(`已添加 ${data.skill?.name || name}`, false);
      setTimeout(() => setStatus('就绪', false), 1200);
    } catch (e) {
      skillFormError.textContent = '网络错误';
      console.warn('submitSkill:', e);
    } finally {
      skillSaveBtn.disabled = false;
    }
  };

  const openSession = async (sessionId) => {
    state.currentSessionId = sessionId;
    renderSessions();
    try {
      const res = await fetch(`/api/sessions/${sessionId}`);
      if (!res.ok) return;
      const data = await res.json();
      const session = state.sessions.find(s => s.id === sessionId);
      topbarTitle.textContent = session?.title || '新对话';
      tokenSummary.textContent = `Tokens ${formatTokens(data.token_usage?.total_tokens)} · Tool ${formatTokens(data.token_usage?.tool_tokens)}`;
      renderMessages(data.messages || []);
    } catch (e) { console.warn('openSession:', e); }
  };

  const createSession = async () => {
    try {
      const res = await fetch('/api/sessions', { method: 'POST' });
      const data = await res.json();
      state.currentSessionId = data.id;
      topbarTitle.textContent = '新对话';
      await loadSessions();
      await openSession(data.id);
      if (isMobileLayout()) setMobileSidebar(false);
    } catch (e) { console.warn('createSession:', e); }
  };

  const deleteSession = async (sessionId) => {
    if (state.busy) return;
    const session = state.sessions.find(s => s.id === sessionId);
    const title = session?.title || '新对话';
    if (!confirm(`删除「${title}」？此操作不可恢复。`)) return;

    try {
      const wasCurrent = state.currentSessionId === sessionId;
      const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
      if (!res.ok) return;

      state.openMenuSessionId = null;
      if (wasCurrent) {
        state.currentSessionId = null;
        topbarTitle.textContent = '新对话';
        renderMessages([]);
      }

      await loadSessions();
      if (!state.currentSessionId) {
        if (state.sessions.length > 0) {
          await openSession(state.sessions[0].id);
        } else {
          await createSession();
        }
      }
      if (isMobileLayout()) setMobileSidebar(false);
    } catch (e) {
      console.warn('deleteSession:', e);
    }
  };

  const copySession = async (sessionId) => {
    if (state.busy) return;
    try {
      const res = await fetch(`/api/sessions/${sessionId}/copy`, { method: 'POST' });
      if (!res.ok) return;
      const data = await res.json();
      state.openMenuSessionId = null;
      state.currentSessionId = data.id;
      await loadSessions();
      await openSession(data.id);
      if (isMobileLayout()) setMobileSidebar(false);
    } catch (e) {
      console.warn('copySession:', e);
    }
  };

  const sendMessage = async () => {
    if (state.busy) return;
    const text = messageInput.value.trim();
    if (!text) return;
    if (!state.currentSessionId) await createSession();

    state.busy = true;
    setStatus('处理中…', true);
    messageInput.value = '';
    messageInput.style.height = 'auto';

    // Optimistic user message
    emptyState.style.display = 'none';
    const userRow = document.createElement('div');
    userRow.className = 'message-row user-row';
    const userLabel = document.createElement('div');
    userLabel.className = 'msg-label';
    userLabel.textContent = '// You';
    const userBubble = document.createElement('div');
    userBubble.className = 'message user';
    userBubble.textContent = text;
    userRow.appendChild(userLabel);
    userRow.appendChild(userBubble);
    messageListEl.appendChild(userRow);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    showThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: state.currentSessionId, message: text }),
      });
      if (res.ok) {
        await res.json();
        await openSession(state.currentSessionId);
        await loadSessions();
      }
    } catch (e) {
      console.warn('sendMessage:', e);
    } finally {
      hideThinking();
      state.busy = false;
      setStatus('就绪', false);
    }
  };

  sendBtn.addEventListener('click', sendMessage);
  newSessionBtn.addEventListener('click', createSession);
  configBtn.addEventListener('click', openConfigModal);
  configForm.addEventListener('submit', submitConfig);
  configModalClose.addEventListener('click', closeConfigModal);
  configCancelBtn.addEventListener('click', closeConfigModal);
  configModal.addEventListener('click', (event) => {
    if (event.target === configModal) closeConfigModal();
  });
  addSkillBtn.addEventListener('click', openSkillModal);
  reloadSkillsBtn.addEventListener('click', reloadSkills);
  skillForm.addEventListener('submit', submitSkill);
  skillModalClose.addEventListener('click', closeSkillModal);
  skillCancelBtn.addEventListener('click', closeSkillModal);
  skillModal.addEventListener('click', (event) => {
    if (event.target === skillModal) closeSkillModal();
  });
  mobileMenuBtn.addEventListener('click', () => {
    setMobileSidebar(!sidebar.classList.contains('open'));
  });
  mobileSidebarClose.addEventListener('click', () => setMobileSidebar(false));
  sidebarBackdrop.addEventListener('click', () => setMobileSidebar(false));
  document.addEventListener('click', () => {
    if (!state.openMenuSessionId) return;
    state.openMenuSessionId = null;
    renderSessions();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (configModal.classList.contains('open')) closeConfigModal();
    if (skillModal.classList.contains('open')) closeSkillModal();
    if (sidebar.classList.contains('open')) setMobileSidebar(false);
    if (state.openMenuSessionId) {
      state.openMenuSessionId = null;
      renderSessions();
    }
  });
  window.addEventListener('resize', () => {
    if (!isMobileLayout()) setMobileSidebar(false);
  });
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  window.addEventListener('load', async () => {
    await loadConfig();
    await loadSkills();
    await loadSessions();
    if (!state.currentSessionId) await createSession();
  });
</script>
</body>
</html>
