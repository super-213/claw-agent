<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claw Agent Web UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">

</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" aria-label="历史对话">
    <div class="brand-area">
      <button class="sidebar-close" id="mobileSidebarClose" type="button" aria-label="关闭历史对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="brand-icon">⚡</div>
      <div class="brand-name"><span>Claw</span> Agent</div>
      <div class="brand-tag">// Web Console v1.0</div>
    </div>
    <div class="sidebar-actions">
      <button class="new-btn" id="newSessionBtn">新建对话</button>
    </div>
    <div class="section-label">// Sessions</div>
    <div class="session-list" id="sessionList"></div>
    <div class="skill-panel">
      <div class="section-label">// Skills</div>
      <div class="skill-toolbar">
        <button class="skill-add-btn" id="addSkillBtn" type="button">添加技能</button>
        <button class="skill-reload-btn" id="reloadSkillsBtn" type="button" title="重载技能" aria-label="重载技能">↻</button>
      </div>
      <div class="skill-list" id="skillList"></div>
    </div>
    <div class="sidebar-footer">
      <button class="config-btn" id="configBtn" type="button">模型设置</button>
      <div class="sys-status">
        <div class="dot"></div>
        <span>System Online</span>
      </div>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="打开历史对话" aria-controls="sidebar" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="18" x2="20" y2="18"></line>
          </svg>
        </button>
        <div class="topbar-title" id="topbarTitle">新对话</div>
      </div>
      <div class="topbar-meta">
        <div class="meta-badge">
          <span id="tokenSummary">Tokens 0</span>
        </div>
        <div class="status-badge" id="statusBadge">
          <div class="dot"></div>
          <span id="statusText">就绪</span>
        </div>
      </div>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="messages-wrap" id="messageList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◈</div>
          <div class="empty-text">// 开始输入以启动对话</div>
        </div>
      </div>
    </div>

    <div class="composer-area">
      <div class="composer">
        <textarea id="messageInput" placeholder="输入指令或问题…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="发送 (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="composer-hint">↵ Enter 发送 · Shift+Enter 换行</div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="configModal" aria-hidden="true">
  <div class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="configModalTitle">
    <div class="modal-head">
      <div class="modal-title" id="configModalTitle">模型设置</div>
      <button class="modal-close" id="configModalClose" type="button" aria-label="关闭">×</button>
    </div>
    <form class="skill-form" id="configForm">
      <div class="config-summary" id="configSummary">
        <span>API URL</span><span>-</span>
        <span>API KEY</span><span>-</span>
        <span>模型</span><span>-</span>
      </div>
      <label class="field-label">
        API URL
        <input class="skill-input" id="configBaseUrlInput" name="base_url" autocomplete="off" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1" />
      </label>
      <label class="field-label">
        API KEY
        <input class="skill-input" id="configApiKeyInput" name="api_key" type="password" autocomplete="new-password" placeholder="留空则保留当前密钥" />
      </label>
      <label class="field-label">
        模型名称
        <input class="skill-input" id="configModelInput" name="model" autocomplete="off" placeholder="qwen-plus" />
      </label>
      <div class="skill-form-error" id="configFormError"></div>
      <div class="modal-actions">
        <button class="modal-secondary" id="configCancelBtn" type="button">取消</button>
        <button class="modal-primary" id="configSaveBtn" type="submit">保存</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-backdrop" id="skillModal" aria-hidden="true">
  <div class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="skillModalTitle">
    <div class="modal-head">
      <div class="modal-title" id="skillModalTitle">添加技能</div>
      <button class="modal-close" id="skillModalClose" type="button" aria-label="关闭">×</button>
    </div>
    <form class="skill-form" id="skillForm">
      <label class="field-label">
        技能名
        <input class="skill-input" id="skillNameInput" name="name" autocomplete="off" placeholder="calculator_ext" />
      </label>
      <label class="field-label">
        Markdown 内容
        <textarea class="skill-textarea" id="skillContentInput" name="content" spellcheck="false" placeholder="# 技能说明&#10;描述这个技能的使用规则、输出格式和注意事项。"></textarea>
      </label>
      <div class="skill-form-error" id="skillFormError"></div>
      <div class="modal-actions">
        <button class="modal-secondary" id="skillCancelBtn" type="button">取消</button>
        <button class="modal-primary" id="skillSaveBtn" type="submit">保存</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
